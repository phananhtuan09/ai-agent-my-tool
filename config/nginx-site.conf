# Optional Nginx reverse proxy for plain HTTP deployment by IP.
# You do not need this file if you are comfortable exposing Uvicorn directly
# with PM2 on a public port such as 8008.
#
# Example:
# - PM2/Uvicorn listens on 127.0.0.1:8008
# - Nginx listens publicly on 8088
# - App is reachable at http://YOUR_VPS_IP:8088

server {
    listen 8088;
    server_name _;

    access_log /var/log/nginx/ai-agent-tool.access.log;
    error_log  /var/log/nginx/ai-agent-tool.error.log;

    location /stream/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

openai:
  base_url: https://api.openai.com/v1
  default_model: gpt-5
  available_models:
  - gpt-5
  - gpt-5-mini
  - gpt-4.1-mini
agents:
  daily_scheduler:
    model: gpt-5-mini
    daily_scheduler:
      reminder_cron: 0 * * * *
      reset_cron: 0 0 * * *
      workday_start: 09:00
      focus_break_minutes: 10
      default_task_minutes: 45
    crypto_airdrop: null
  crypto_airdrop:
    model: gpt-4.1-mini
    daily_scheduler: null
    crypto_airdrop:
      cron: 0 */6 * * *
      sources:
        airdrops_io:
          enabled: true
          label: airdrops.io
          url: https://airdrops.io
          simulate_failure: false
        cryptorank:
          enabled: true
          label: CryptoRank
          url: https://cryptorank.io
          simulate_failure: false
        defillama:
          enabled: true
          label: DeFiLlama
          url: https://defillama.com
          simulate_failure: false

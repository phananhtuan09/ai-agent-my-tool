agents:
  job_finder:
    provider: openai
    model: gpt-5
    api_key_env_var: OPENAI_API_KEY
    job_finder:
      cron: 0 8 * * *
      sources:
        topcv:
          enabled: true
          label: TopCV
          simulate_failure: false
        itviec:
          enabled: true
          label: ITviec
          simulate_failure: false
        vietnamworks:
          enabled: true
          label: VietnamWorks
          simulate_failure: false
      filters:
        salary_min: 700
        salary_max: 1200
        locations:
        - Ho Chi Minh City
        must_have_frameworks:
        - React
        - TypeScript
        nice_to_have_frameworks:
        - Next.js
        exclude_keywords: []
    daily_scheduler: null
    crypto_airdrop: null
  daily_scheduler:
    provider: openai
    model: gpt-5-mini
    api_key_env_var: OPENAI_API_KEY
    daily_scheduler:
      reminder_cron: 0 * * * *
      reset_cron: 0 0 * * *
      workday_start: 09:00
      focus_break_minutes: 10
      default_task_minutes: 45
  crypto_airdrop:
    provider: openai
    model: gpt-5
    api_key_env_var: OPENAI_API_KEY
    crypto_airdrop:
      cron: 0 */6 * * *
      sources:
        airdrops_io:
          enabled: true
          label: airdrops.io
          url: https://airdrops.io
        cryptorank:
          enabled: true
          label: CryptoRank
          url: https://cryptorank.io
        defillama:
          enabled: true
          label: DeFiLlama
          url: https://defillama.com

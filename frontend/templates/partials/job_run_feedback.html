<div class="feedback feedback-{{ feedback.message_type }}" role="status" aria-live="polite">
  <strong>
    {% if feedback.message_type == "success" %}
      Crawl finished
    {% else %}
      Crawl blocked
    {% endif %}
  </strong>
  <p>{{ feedback.message }}</p>
</div>

<div id="job-results-panel" hx-swap-oob="innerHTML">
  {% include "partials/job_cards.html" %}
</div>

<div class="modal-backdrop" onclick="window.AppShell.closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <p class="eyebrow">Model configuration</p>
        <h3>{{ agent.title }}</h3>
      </div>
      <button type="button" class="btn btn-ghost" onclick="window.AppShell.closeModal()">Close</button>
    </div>

    <form
      class="config-form"
      hx-post="/agents/{{ agent.slug }}/config"
      hx-target="#config-feedback"
      hx-swap="innerHTML"
    >
      <label>
        <span>Model</span>
        <select name="model">
          <option value="">
            Use global default ({{ openai_config.default_model }})
          </option>
          {% for model in model_options %}
            <option value="{{ model }}" {% if agent_config.model == model %}selected{% endif %}>
              {{ model }}
            </option>
          {% endfor %}
        </select>
      </label>

      {% if message %}
        {% include "partials/config_feedback.html" %}
      {% endif %}

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" data-loading-text="Saving...">Save model</button>
      </div>
    </form>

    <div id="config-feedback"></div>
  </div>
</div>

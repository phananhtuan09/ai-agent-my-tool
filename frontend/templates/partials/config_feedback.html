<div class="feedback feedback-{{ message_type }}" role="status" aria-live="polite">
  <strong>
    {% if message_type == "success" %}
      Config updated
    {% elif message_type == "info" %}
      Info
    {% elif message_type == "warn" %}
      Warning
    {% else %}
      Config error
    {% endif %}
  </strong>
  <p>{{ message }}</p>
</div>
